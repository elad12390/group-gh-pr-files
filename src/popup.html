<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1f2328;
        --muted: #656d76;
        --border: #d0d7de;
        --accent: #0969da;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --fg: #e6edf3;
          --muted: #7d8590;
          --border: #30363d;
          --accent: #2f81f7;
        }
      }
      body {
        margin: 0;
        width: 280px;
        background: var(--bg);
        color: var(--fg);
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        padding: 14px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 10px;
        color: var(--muted);
      }
      button {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.05);
      }
      kbd {
        background: color-mix(in srgb, var(--fg) 10%, transparent);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 11px;
      }
      .note {
        margin-top: 10px;
        font-size: 11.5px;
        color: var(--muted);
      }
      ul {
        margin: 6px 0 0;
        padding-left: 18px;
        color: var(--muted);
        font-size: 11.5px;
      }
    </style>
  </head>
  <body>
    <h1>PR File Grouper</h1>
    <p>Open a GitHub pull request, then toggle the side panel.</p>
    <button id="toggle">Toggle panel</button>
    <div class="note" id="status"></div>
    <div class="note">
      Shortcut: <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>G</kbd>
      <ul>
        <li>Filter by name, <code>/regex/</code>, or space = OR</li>
        <li>Chips select all files of a type</li>
        <li>Shift-click checkboxes for ranges</li>
        <li>Save selections as reusable groups</li>
        <li>Star files &amp; "Show only" to focus review</li>
      </ul>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
