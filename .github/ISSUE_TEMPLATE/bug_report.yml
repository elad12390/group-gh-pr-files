name: Bug report
description: Report a problem with the extension
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the details
        below so we can reproduce and fix it quickly.
  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "e.g. Firefox 141, Chrome 128"
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      description: Shown on the browser's extensions page / in `manifest.json`.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: pr-url
    attributes:
      label: Example PR URL
      description: A public PR where this reproduces, if possible.
      placeholder: "https://github.com/owner/repo/pull/123/files"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Any errors from the browser devtools console (F12).
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I'm on the latest version of the extension.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
