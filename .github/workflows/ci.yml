name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (web-ext)
        run: bun run lint

      - name: Build extension
        run: bun run build

      - name: Upload packaged extension
        uses: actions/upload-artifact@v7
        with:
          name: extension
          path: web-ext-artifacts/*.zip
          if-no-files-found: error
